<div id="game-container">
<div class="start-screen">
    <!-- Ambient glow orbs -->
    <div class="start-orb start-orb--pink"></div>
    <div class="start-orb start-orb--purple"></div>
    <div class="start-orb start-orb--teal"></div>

    <!-- Main content -->
    <div class="start-content">
        <!-- Eyebrow label -->
        <p class="start-eyebrow">✦ Social Bingo Night ✦</p>

        <!-- Stacked title -->
        <h1 class="start-title">
            <span class="start-title-soc">SOC</span>
            <span class="start-title-ops">OPS</span>
        </h1>

        <!-- Tagline -->
        <p class="start-subline">Find your people. Fill your card. Win the room.</p>

        <!-- Decorative BINGO row -->
        <div class="start-bingo-row">
            <div class="start-grid-cell start-grid-cell--lit">B</div>
            <div class="start-grid-cell">I</div>
            <div class="start-grid-cell start-grid-cell--lit">N</div>
            <div class="start-grid-cell">G</div>
            <div class="start-grid-cell start-grid-cell--lit">O</div>
        </div>

        <!-- How-to steps -->
        <div class="start-steps">
            <div class="start-step">
                <span class="start-step-num">1</span>
                <div class="start-step-body">
                    <strong>Find</strong>
                    <span>people matching the questions on your card</span>
                </div>
            </div>
            <div class="start-step">
                <span class="start-step-num">2</span>
                <div class="start-step-body">
                    <strong>Tap</strong>
                    <span>a square when you find a match</span>
                </div>
            </div>
            <div class="start-step">
                <span class="start-step-num">3</span>
                <div class="start-step-body">
                    <strong>Win</strong>
                    <span>by getting 5 in a row — BINGO!</span>
                </div>
            </div>
        </div>

        <!-- CTA button -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="start-cta">
            Let's Play
        </button>

        <!-- Caption -->
        <p class="start-caption">No experience needed. Just be ready to mingle!</p>
    </div>
</div>
</div>
