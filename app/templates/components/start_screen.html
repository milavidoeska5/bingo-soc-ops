<div id="game-container">
<div class="start-screen">
    <!-- CRT scanline overlay -->
    <div class="start-scanlines"></div>

    <div class="start-content">
        <!-- Arcade scoreboard row -->
        <p class="start-scoreboard" aria-label="Players: unlimited. High score: Bingo">PLAYERS: &#x221e;&nbsp;&nbsp;&nbsp;HIGH SCORE: BINGO</p>

        <!-- Blinking eyebrow -->
        <p class="start-eyebrow">INSERT COIN TO PLAY</p>

        <!-- Neon title -->
        <h1 class="start-title">SOC OPS</h1>

        <!-- Subline -->
        <p class="start-subline">Social Bingo — find your crew, mark your card, win the game</p>

        <!-- Level-select tiles -->
        <div class="start-levels">
            <div class="start-level start-level--yellow">
                <span class="start-level-num">LVL 01</span>
                <span class="start-level-label">Find people matching the questions</span>
            </div>
            <div class="start-level start-level--pink">
                <span class="start-level-num">LVL 02</span>
                <span class="start-level-label">Tap a square when you find a match</span>
            </div>
            <div class="start-level start-level--teal">
                <span class="start-level-num">LVL 03</span>
                <span class="start-level-label">Get 5 in a row to win!</span>
            </div>
        </div>

        <!-- CTA arcade button -->
        <div class="start-cta-wrapper">
            <button
                hx-post="/mode-select"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="start-cta">
                PRESS START
            </button>
        </div>

        <!-- Caption -->
        <p class="start-caption">No experience needed. Just be ready to mingle.</p>
    </div>
</div>
</div>
