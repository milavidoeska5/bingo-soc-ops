<div class="w-full max-w-md mx-auto">
    {% for square in session.board %}
    <button
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        class="w-full text-left p-4 mb-2 rounded-lg shadow-sm {% if square.is_marked %}bg-celebrate-mint{% else %}bg-white{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ square.text }}">
        <span>{% if square.is_marked %}☑{% else %}☐{% endif %}</span>
        <span>{{ square.text }}</span>
    </button>
    {% endfor %}
</div>
