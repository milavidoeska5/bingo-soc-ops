<div id="game-container">
<div class="flex flex-col min-h-full bg-gradient-to-br from-primary-soft via-secondary-soft to-white">
    <!-- Playful Header -->
    <header class="flex items-center justify-between p-4 bg-gradient-to-r from-primary to-secondary text-white shadow-lg">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-white font-bold px-4 py-2 rounded-full hover-scale transition-all duration-200 flex items-center gap-2">
            ← Back
        </button>
        <h1 class="font-black text-2xl letter-wider">🎉 Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Fun Instructions -->
    <p class="text-center text-primary font-semibold text-base py-3 px-4 bg-white bg-opacity-50">
        ✨ Tap a square when you find a match! ✨
    </p>

    <!-- Bingo Celebration Notification -->
    {% if session.has_bingo %}
    <div class="bg-gradient-to-r from-accent-pink to-accent-orange text-white text-center py-3 font-black text-lg animate-bounce-in shadow-lg">
        🎊 BINGO! YOU GOT A LINE! 🎊
    </div>
    {% endif %}

    <!-- Board Container -->
    <div class="flex-1 flex items-center justify-center p-4">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
