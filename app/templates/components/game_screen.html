    {% if session.is_scavenger_mode %}
    <div class="p-4 bg-white shadow-sm">
        <h2 class="text-xl text-center text-primary">Scavenger Hunt</h2>
        <!-- FIXED: Label moved outside progress bar for visibility at all states (issue #9) -->
        <p class="text-center text-primary font-semibold mb-3">
            {{ session.scavenger_progress }} / {{ session.scavenger_total }} found
        </p>
        <!-- Progress bar with border for visibility at 0% (issue #9) -->
        <div
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="{{ session.scavenger_total }}"
            aria-valuenow="{{ session.scavenger_progress }}"
            style="height: 0.75rem; border-radius: 9999px; background-color: #e5e7eb; overflow: hidden; border: 1px solid #d1d5db;">
            <div
                style="height: 100%; width: {{ (session.scavenger_progress / session.scavenger_total * 100) if session.scavenger_total else 0 }}%; background: linear-gradient(90deg, #7c3aed 0%, #14b8a6 100%); transition: width 300ms ease-in-out;"></div>
        </div>
    </div>
