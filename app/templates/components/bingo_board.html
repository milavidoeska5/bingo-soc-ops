<div class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square p-4 rounded-2xl bg-gradient-to-br from-secondary to-secondary-soft border-4 border-primary shadow-xl">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-2 text-center rounded-lg transition-all duration-200 select-none min-h-[70px] text-xs leading-tight font-semibold
        {%- if square.is_marked %}
            {%- if is_winning %} bg-celebrate-gold border-4 border-accent-yellow text-gray-900 animate-pulse-glow shadow-lg animate-scale-pop
            {%- else %} bg-celebrate-mint border-4 border-secondary text-gray-900 animate-pulse-glow shadow-md
            {%- endif %}
        {%- else %} bg-white text-gray-800 border-2 border-gray-200 hover-scale active-scale active:bg-gray-50 shadow-sm
        {%- endif %}
        {%- if square.is_free_space %} font-black text-sm bg-gradient-to-br from-accent-pink to-accent-orange text-white border-4 border-accent-pink shadow-lg cursor-default{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{% if square.is_free_space %}🎯 FREE 🎯{% else %}{{ square.text }}{% endif %}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-1 right-1 text-lg animate-scale-pop">✨</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
